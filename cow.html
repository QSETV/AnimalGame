<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cow Sound</title>

  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: Arial;
      text-align: center;
      background-color: #f5f5f5;
    }

    img {
      max-width: 250px;
      border-radius: 20px;
    }
  </style>
</head>

<body>

  <div>
    <img src="cow.jpg" alt="Cow">
    <h1>Playing sound...</h1>
  </div>

  <audio id="sound" autoplay>
    <source src="cow.mp3" type="audio/mpeg">
  </audio>

  <script>
    window.addEventListener("load", () => {
      const audio = document.getElementById("sound");

      // Try to force autoplay
      audio.play().catch(() => {
        console.log("Autoplay blocked");
      });
    });
  </script>

</body>
</html>
