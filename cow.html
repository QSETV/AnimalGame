<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cow Sound</title>

  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: Arial;
      text-align: center;
      background-color: #f5f5f5;
    }

    img {
      max-width: 250px;
      border-radius: 20px;
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      background-color: #0078D4;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

  cow.jpg
  <h1>Playing sound...</h1>

  <button onclick="restartSound()">🔁 Play Again</button>

  <audio id="sound">
    cow.mp3
  </audio>

  <script>
    // Autoplay attempt
    window.addEventListener("load", () => {
      const audio = document.getElementById("sound");

      audio.play().catch(() => {
        document.body.addEventListener("click", () => {
          audio.play();
        }, { once: true });
      });
    });

    function restartSound() {
      const audio = document.getElementById("sound");
      audio.currentTime = 0;
      audio.play();
    }
  </script>

</body>
</html>
