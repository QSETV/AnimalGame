<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cow Sound</title>
  <style>
    body {
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
      font-family:Arial;
      text-align:center;
      background:#f5f5f5;
    }
    img {
      max-width:250px;
      border-radius:20px;
    }
  </style>
</head>

<body>

  <div>
    <img src="cow.jpg">
    <h1>Tap anywhere to hear the sound</h1>
  </div>

  <audio id="sound">
    <source src="cow.mp3" type="audio/mpeg">
  </audio>

  <script>
    function playOnce() {
      const audio = document.getElementById("sound");
      audio.play();
      document.body.removeEventListener("click", playOnce);
      document.body.removeEventListener("touchstart", playOnce);
    }

    document.body.addEventListener("click", playOnce);
    document.body.addEventListener("touchstart", playOnce);
  </script>

</body>
</html>
